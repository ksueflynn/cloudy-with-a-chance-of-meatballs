<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="src/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <title>Weather App</title>
  </head>
  <body>
    <div class="weather-app">
      <header>
        <form>
          <input type="search" placeholder="Enter a city..." required />
          <input type="submit" />
        </form>
      </header>
      <main>
        <div>
          <h1>London</h1>
          <p>
            Tuesday 14:49, scattered clouds
            <br />
            Humidity: 68%, Wind 3.13km/h
          </p>
        </div>

        <div>🌟 12°C</div>
      </main>
      <footer>
        This project was coded by
        <a href="https://github.com/ksueflynn" target="_blank">Kelsey Flynn</a>
        is open-sourced on
        <a
          href="https://github.com/ksueflynn/cloudy-with-a-chance-of-meatballs"
          target="_blank"
          >GitHub</a
        >
        and hosted on
        <a
          href="https://cloudy-with-a-chance-of-meatballs.netlify.app/"
          target="_blank"
          >Netlify</a
        >
      </footer>
    </div>
  </body>
</html>
